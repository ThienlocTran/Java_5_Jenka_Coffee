# Production profile.
# Activate with: SPRING_PROFILES_ACTIVE=production
# Keep all secrets in the host environment or systemd EnvironmentFile.
# Production chỉ đọc SPRING_DATASOURCE_* để tách biệt khỏi LOCAL_DATABASE_* của local.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.com.springboot.jenka_coffee=${APP_LOG_LEVEL:INFO}

app.base-url=${APP_BASE_URL}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}}
app.jwt.secret=${JWT_SECRET}

server.forward-headers-strategy=framework
