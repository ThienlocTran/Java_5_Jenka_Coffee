# Production profile.
# Activate with: SPRING_PROFILES_ACTIVE=production

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Production must validate schema only.
# Manual production env must use: DDL_AUTO=validate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
cloudinary.base-folder=${CLOUDINARY_BASE_FOLDER:jenka/prod}

# Production OAuth client should come from production env.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:${GOOGLE_CLIENT_ID:}}
