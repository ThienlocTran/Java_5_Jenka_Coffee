# Production profile.
# Activate with: SPRING_PROFILES_ACTIVE=production
# Keep all secrets in the host environment or systemd EnvironmentFile.
# Production reads only SPRING_DATASOURCE_* to stay separate from LOCAL_DATABASE_*.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Production must validate schema only.
# Manual production env must use: DDL_AUTO=validate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.com.springboot.jenka_coffee=${APP_LOG_LEVEL:INFO}

app.base-url=${APP_BASE_URL}
app.site-url=${APP_SITE_URL}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}}
app.jwt.secret=${JWT_SECRET}

# Production OAuth client should come from production env.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:${GOOGLE_CLIENT_ID:}}

server.forward-headers-strategy=framework
