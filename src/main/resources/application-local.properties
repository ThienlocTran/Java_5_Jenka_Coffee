# Local profile.
# Activate with: SPRING_PROFILES_ACTIVE=local
# IntelliJ can also use: -Dspring.profiles.active=local

# Local profile ưu tiên Neon qua LOCAL_DATABASE_*.
# Nếu IntelliJ/EnvFile chưa nạp biến thì mới fallback về PostgreSQL local an toàn.
spring.datasource.url=${LOCAL_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jenka_coffee?sslmode=disable}}
spring.datasource.username=${LOCAL_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:jenka_user}}
spring.datasource.password=${LOCAL_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:jenka_local_password}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
cloudinary.base-folder=${CLOUDINARY_BASE_FOLDER:jenka/dev}

# Local Google OAuth verifier must use the same client ID as the Vite frontend.
# Preferred local env var: LOCAL_GOOGLE_OAUTH_CLIENT_ID
google.oauth.client-id=${LOCAL_GOOGLE_OAUTH_CLIENT_ID:${GOOGLE_OAUTH_CLIENT_ID:${GOOGLE_CLIENT_ID:}}}
