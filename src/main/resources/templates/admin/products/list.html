<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/admin-layout :: admin_layout(~{::main})}">
<body>
<main>
    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title" th:text="#{admin.product.title}">Quản lý Sản phẩm</h1>
        <div class="page-breadcrumb">
            <a href="/admin/dashboard"><i class="fas fa-home"></i> <span th:text="#{admin.dashboard.breadcrumb}">Dashboard</span></a> / <span th:text="#{admin.product.breadcrumb}">Sản phẩm</span>
        </div>
    </div>

    <!-- Action Bar -->
    <div class="admin-card">
        <div class="card-header-custom">
            <h5 class="card-title-custom">
                <i class="fas fa-list me-2"></i>
                <span th:text="#{admin.product.list_title}">Danh sách sản phẩm</span>
            </h5>
            <a href="/admin/product/create" class="btn btn-primary-custom">
                <i class="fas fa-plus me-2"></i><span th:text="#{admin.product.add_new}">Thêm sản phẩm</span>
            </a>
        </div>

        <!-- Filter & Search -->
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" th:placeholder="#{admin.product.search_placeholder}" id="searchInput">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="categoryFilter">
                    <option value="" th:text="#{admin.product.all_categories}">Tất cả danh mục</option>
                    <option value="MAY_PHA">Máy Pha Cà Phê</option>
                    <option value="MAY_XAY">Máy Xay Cà Phê</option>
                    <option value="XAY_EP">Máy Xay & Máy Ép</option>
                    <option value="CF_AN_VAT">Cà Phê & Đồ Ăn Vặt</option>
                    <option value="DUNG_CU">Dụng Cụ Pha Chế</option>
                    <option value="HANG_CU">Máy Pha & Xay Cũ Lướt</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="statusFilter">
                    <option value="" th:text="#{admin.product.all_status}">Tất cả trạng thái</option>
                    <option value="1" th:text="#{admin.product.status_active}">Đang bán</option>
                    <option value="0" th:text="#{admin.product.status_inactive}">Ngừng bán</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" id="resetFilterBtn">
                    <i class="fas fa-redo me-2"></i>
                </button>
            </div>
        </div>

        <!-- Products Table -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 50px;">
                            <input type="checkbox" class="form-check-input">
                        </th>
                        <th style="width: 80px;" th:text="#{admin.product.image}">Ảnh</th>
                        <th th:text="#{admin.product.name}">Tên sản phẩm</th>
                        <th th:text="#{admin.product.category}">Danh mục</th>
                        <th th:text="#{admin.product.price}">Giá</th>
                        <th th:text="#{admin.product.created_date}">Ngày tạo</th>
                        <th th:text="#{admin.product.status}">Trạng thái</th>
                        <th style="width: 150px;" th:text="#{admin.product.actions}">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="8" class="text-center py-5">
                            <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
                            <p class="text-muted" th:text="#{admin.product.empty}">Chưa có sản phẩm nào</p>
                        </td>
                    </tr>
                    
                    <tr th:each="item : ${items}">
                        <td>
                            <input type="checkbox" class="form-check-input">
                        </td>
                        <td>
                            <div style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;">
                                <img th:src="@{${item.image}}" 
                                     th:alt="${item.name}"
                                     class="rounded"
                                     style="width: 60px; height: 60px; object-fit: cover;"
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                <div style="display: none; width: 60px; height: 60px; background: #f0f0f0; border-radius: 4px; align-items: center; justify-content: center;">
                                    <i class="fas fa-image text-muted" style="font-size: 24px;"></i>
                                </div>
                            </div>
                        </td>
                        <td>
                            <strong th:text="${item.name}">Product Name</strong>
                        </td>
                        <td>
                            <span class="badge bg-info" th:text="${item.category.name}">Category</span>
                        </td>
                        <td>
                            <strong class="text-success" th:text="${#numbers.formatInteger(item.price, 0, 'POINT')} + ' ' + (${#locale.language == 'vi'} ? 'đ' : 'VND')">0 đ</strong>
                        </td>
                        <td>
                            <small class="text-muted" th:text="${#temporals.format(item.createDate, 'dd/MM/yyyy')}">01/01/2026</small>
                        </td>
                        <td>
                            <span th:if="${item.available}" class="badge bg-success">
                                <i class="fas fa-check-circle"></i> <span th:text="#{admin.product.status_active}">Đang bán</span>
                            </span>
                            <span th:unless="${item.available}" class="badge bg-secondary">
                                <i class="fas fa-times-circle"></i> <span th:text="#{admin.product.status_inactive}">Ngừng bán</span>
                            </span>
                        </td>
                        <td>
                            <div class="btn-group" role="group">
                                <a th:href="@{/admin/product/edit/{id}(id=${item.id})}" 
                                   class="btn btn-sm btn-warning" 
                                   th:title="#{admin.product.edit}">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="btn btn-sm toggle-btn" 
                                        th:classappend="${item.available} ? 'btn-secondary' : 'btn-success'"
                                        th:data-toggle-url="@{/admin/product/toggle/{id}(id=${item.id})}"
                                        th:data-item-name="${item.name}"
                                        th:data-current-status="${item.available}"
                                        th:title="${item.available} ? #{admin.product.hide} : #{admin.product.show}">
                                    <i class="fas" th:classappend="${item.available} ? 'fa-eye-slash' : 'fa-eye'"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
            <div class="text-muted small">
                <span th:text="#{admin.product.showing}">Hiển thị</span> 
                <strong th:text="${items.size()}">0</strong> / 
                <strong th:text="${totalElements}">0</strong> 
                <span th:text="#{admin.product.products_count}">sản phẩm</span>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/product/list(p=${currentPage - 1})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" 
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/admin/product/list(p=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/product/list(p=${currentPage + 1})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
    
    <script src="/js/admin-filter.js"></script>
</main>
</body>
</html>
