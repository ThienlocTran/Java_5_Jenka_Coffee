<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/admin-layout :: admin_layout(~{::main})}">
<body>
<main>
    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title" th:text="${item?.id == null ? 'Thêm tin tức mới' : 'Chỉnh sửa tin tức'}">Thêm tin tức mới</h1>
        <div class="page-breadcrumb">
            <a href="/admin/dashboard"><i class="fas fa-home"></i> Dashboard</a> / 
            <a href="/admin/news/list">Tin tức</a> / 
            <span th:text="${item?.id == null ? 'Thêm mới' : 'Chỉnh sửa'}">Thêm mới</span>
        </div>
    </div>

    <!-- Form Card -->
    <div class="admin-card">
        <div class="card-header-custom">
            <h5 class="card-title-custom">
                <i class="fas fa-newspaper me-2"></i>
                <span th:text="${item?.id == null ? 'Thông tin tin tức mới' : 'Cập nhật thông tin'}">Thông tin tin tức mới</span>
            </h5>
        </div>

        <form th:action="@{/admin/news/save}" 
              th:object="${item}" 
              method="post" 
              enctype="multipart/form-data"
              class="needs-validation" 
              novalidate>
            
            <input type="hidden" th:field="*{id}">
            
            <div class="row">
                <!-- Left Column -->
                <div class="col-md-8">
                    <!-- Title -->
                    <div class="mb-3">
                        <label for="title" class="form-label">
                            Tiêu đề <span class="text-danger">*</span>
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="title" 
                               th:field="*{title}"
                               placeholder="Nhập tiêu đề tin tức"
                               required>
                        <div class="invalid-feedback">
                            Vui lòng nhập tiêu đề tin tức
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="mb-3">
                        <label for="content" class="form-label">
                            Nội dung <span class="text-danger">*</span>
                        </label>
                        <textarea class="form-control" 
                                  id="content" 
                                  th:field="*{content}"
                                  rows="10"
                                  placeholder="Nhập nội dung tin tức..."
                                  required></textarea>
                        <div class="invalid-feedback">
                            Vui lòng nhập nội dung tin tức
                        </div>
                    </div>

                    <!-- Status -->
                    <div class="mb-3">
                        <label for="available" class="form-label">Trạng thái</label>
                        <select class="form-select" id="available" th:field="*{available}">
                            <option th:value="true">Hiển thị</option>
                            <option th:value="false">Ẩn</option>
                        </select>
                    </div>
                </div>

                <!-- Right Column - Image Upload -->
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Hình ảnh</label>
                        
                        <!-- Image Preview -->
                        <div class="text-center mb-3">
                            <img id="imagePreview" 
                                 th:src="${item.image != null ? item.image : 'https://via.placeholder.com/300x200?text=No+Image'}"
                                 class="img-fluid rounded border"
                                 style="max-height: 300px; object-fit: cover;">
                        </div>

                        <!-- Upload Button -->
                        <input type="file" 
                               class="form-control" 
                               id="imageFile" 
                               name="imageFile"
                               accept="image/*"
                               onchange="previewImage(event)">
                        <small class="text-muted">Định dạng: JPG, PNG, GIF. Tối đa 2MB</small>
                        
                        <!-- Hidden field for existing image -->
                        <input type="hidden" th:field="*{image}">
                    </div>

                    <!-- Quick Info -->
                    <div class="alert alert-info" th:if="${item.id != null}">
                        <small>
                            <strong>Ngày tạo:</strong><br>
                            <span th:text="${#temporals.format(item.createDate, 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
                        </small>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-between mt-4 pt-3 border-top">
                <a href="/admin/news/list" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Quay lại
                </a>
                <div>
                    <button type="reset" class="btn btn-outline-secondary me-2">
                        <i class="fas fa-redo me-2"></i>Làm mới
                    </button>
                    <button type="submit" class="btn btn-primary-custom">
                        <i class="fas fa-save me-2"></i>Lưu tin tức
                    </button>
                </div>
            </div>
        </form>
    </div>
</main>

<script>
    // Form validation
    (function() {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();

    // Image preview
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            if (file.size > 2 * 1024 * 1024) {
                alert('Kích thước file quá lớn! Vui lòng chọn file nhỏ hơn 2MB.');
                event.target.value = '';
                return;
            }

            if (!file.type.startsWith('image/')) {
                alert('Vui lòng chọn file hình ảnh!');
                event.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }
</script>
</body>
</html>
