<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: admin_layout(~{:: body})}">
<head>
    <title>Quản Lý Lịch Hẹn</title>
</head>
<body>
<div class="container-fluid px-4">
    <h4 class="mt-4 fw-bold text-secondary"><i class="fas fa-tools me-2"></i>QUẢN LÝ LỊCH HẸN</h4>

    <div class="card mb-4 border-0 shadow-sm mt-3">
        <div class="card-header bg-white py-3">
            <i class="fas fa-table me-1"></i>
            Danh sách yêu cầu sửa chữa
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Khách hàng</th>
                    <th>Thiết bị</th>
                    <th>Ngày hẹn</th>
                    <th>Trạng thái</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td>
                        <div class="fw-bold" th:text="${b.customerName}"></div>
                        <div class="small text-muted" th:text="${b.phone}"></div>
                    </td>
                    <td th:text="${b.machineModel}"></td>
                    <td th:text="${#temporals.format(b.bookingDate, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <span th:if="${b.status == 0}" class="badge bg-warning text-dark">Chờ xử lý</span>
                        <span th:if="${b.status == 1}" class="badge bg-success">Hoàn tất</span>
                    </td>
                    <td class="text-end">
                        <form th:if="${b.status == 0}" th:action="@{/admin/booking/update-status}" method="post" style="display:inline;">
                            <input type="hidden" name="id" th:value="${b.id}">
                            <input type="hidden" name="status" value="1">
                            <button class="btn btn-sm btn-outline-success"><i class="fas fa-check"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
