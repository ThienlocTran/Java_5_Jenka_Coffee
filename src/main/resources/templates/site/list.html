<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html_content(~{::body})}">
<head>
    <title>Lịch sử đơn hàng</title>
</head>
<body>

<div class="container py-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted">Trang chủ</a></li>
            <li class="breadcrumb-item active text-danger" aria-current="page">Lịch sử mua hàng</li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-lg-3 mb-4">
            <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                <div class="card-header bg-danger text-white py-3">
                    <h6 class="mb-0 fw-bold"><i class="fas fa-user-circle me-2"></i>Tài khoản</h6>
                </div>
                <div class="list-group list-group-flush">
                    <a href="#" class="list-group-item list-group-item-action py-3 text-muted">
                        <i class="fas fa-info-circle me-3" style="width: 20px;"></i>Thông tin tài khoản
                    </a>
                    <a href="/order/list" class="list-group-item list-group-item-action py-3 active bg-light text-danger border-start border-4 border-danger fw-bold">
                        <i class="fas fa-history me-3" style="width: 20px;"></i>Lịch sử mua hàng
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3 text-muted">
                        <i class="fas fa-key me-3" style="width: 20px;"></i>Đổi mật khẩu
                    </a>
                    <a href="/logout" class="list-group-item list-group-item-action py-3 text-danger border-top">
                        <i class="fas fa-sign-out-alt me-3" style="width: 20px;"></i>Đăng xuất
                    </a>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="card border-0 shadow-sm rounded-3 h-100">
                <div class="card-header bg-white py-3 border-bottom-0">
                    <h5 class="fw-bold mb-0 text-uppercase text-secondary">
                        <i class="fas fa-shopping-bag me-2"></i> Đơn hàng của tôi
                    </h5>
                </div>

                <div class="card-body p-0">
                    <div th:if="${orders.totalElements == 0}" class="text-center py-5">
                        <img src="https://cdn-icons-png.flaticon.com/512/11329/11329060.png" width="80" class="opacity-25 mb-3" alt="Empty">
                        <p class="text-muted mb-3">Bạn chưa có đơn hàng nào.</p>
                        <a href="/" class="btn btn-danger px-4 rounded-pill fw-bold shadow-sm">
                            <i class="fas fa-cart-plus me-2"></i>Mua sắm ngay
                        </a>
                    </div>

                    <div th:if="${orders.totalElements > 0}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-secondary">
                            <tr>
                                <th class="ps-4 py-3">Mã đơn</th>
                                <th class="py-3">Ngày đặt</th>
                                <th class="py-3">Địa chỉ nhận</th>
                                <th class="py-3">Tổng tiền</th>
                                <th class="py-3 text-center">Trạng thái</th>
                            </tr>
                            </thead>

                            <tbody id="orderTableBody">
                            <th:block th:fragment="order_rows">
                                <tr th:each="o : ${orders.content}">
                                    <td class="ps-4 fw-bold text-danger" th:text="${'#' + o.id}">#1001</td>

                                    <td class="text-secondary small">
                                        <i class="far fa-clock me-1"></i>
                                        <span th:text="${#temporals.format(o.createDate, 'dd/MM/yyyy HH:mm')}"></span>
                                    </td>

                                    <td class="text-dark small text-truncate" style="max-width: 200px;"
                                        th:text="${o.address}" th:title="${o.address}">
                                    </td>

                                    <td class="fw-bold text-dark"
                                        th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                    </td>

                                    <td class="text-center">
                                        <span th:if="${o.status == 0}" class="badge rounded-pill bg-warning text-dark px-3">Chờ xác nhận</span>
                                        <span th:if="${o.status == 1}" class="badge rounded-pill bg-info text-dark px-3">Đã xác nhận</span>
                                        <span th:if="${o.status == 2}" class="badge rounded-pill bg-primary px-3">Đang giao</span>
                                        <span th:if="${o.status == 3}" class="badge rounded-pill bg-success px-3">Hoàn tất</span>
                                        <span th:if="${o.status == 4}" class="badge rounded-pill bg-danger px-3">Đã hủy</span>
                                    </td>
                                </tr>
                            </th:block>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card-footer bg-white border-top-0 py-3 text-center" th:if="${totalPages > 1}">
                    <button id="btnLoadMore" class="btn btn-outline-danger rounded-pill px-4" onclick="loadMoreOrders()">
                        <span id="btnText">Xem thêm đơn hàng cũ hơn</span>
                        <span id="btnLoading" class="spinner-border spinner-border-sm ms-2" style="display:none"></span>
                    </button>
                    <input type="hidden" id="currentPage" th:value="${currentPage}">
                    <input type="hidden" id="totalPages" th:value="${totalPages}">
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    function loadMoreOrders() {
        let current = parseInt(document.getElementById('currentPage').value);
        let total = parseInt(document.getElementById('totalPages').value);
        let nextPage = current + 1;

        if (nextPage >= total) return;

        // Hiệu ứng loading
        document.getElementById('btnText').innerText = "Đang tải...";
        document.getElementById('btnLoading').style.display = "inline-block";
        document.getElementById('btnLoadMore').disabled = true;

        // Gọi API
        fetch('/order/load-more?page=' + nextPage)
            .then(response => response.text())
            .then(html => {
                // Nối HTML mới vào bảng
                document.getElementById('orderTableBody').insertAdjacentHTML('beforeend', html);

                // Cập nhật trang hiện tại
                document.getElementById('currentPage').value = nextPage;

                // Reset nút bấm
                document.getElementById('btnText').innerText = "Xem thêm đơn hàng cũ hơn";
                document.getElementById('btnLoading').style.display = "none";
                document.getElementById('btnLoadMore').disabled = false;

                // Ẩn nút nếu hết trang
                if (nextPage >= total - 1) {
                    document.getElementById('btnLoadMore').style.display = 'none';
                }
            })
            .catch(err => {
                console.error(err);
                alert("Lỗi tải trang!");
                document.getElementById('btnLoadMore').disabled = false;
            });
    }
</script>

</body>
</html>
