<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: html_content(~{::body})}">
<body>

    <!-- BREADCRUMB -->
    <div class="bg-light py-3 mb-4">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="/index" class="text-decoration-none text-muted" th:text="#{breadcrumb.home}">Trang chủ</a></li>
                    <li class="breadcrumb-item active text-dark fw-bold" aria-current="page" th:text="#{breadcrumb.products}">Sản phẩm</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row">
            <!-- SIDEBAR FILTERS with STICKY positioning -->
            <div class="col-lg-3 mb-4 mb-lg-0">
                <div class="sidebar-sticky" style="position: sticky; top: 100px; max-height: calc(100vh - 120px); overflow-y: auto;">
                    <!-- Categories -->
                    <div class="mb-4">
                        <h5 class="fw-bold text-uppercase mb-3" style="font-size: 1rem;" th:text="#{product.list.categories}">Danh mục</h5>
                        <ul class="list-unstyled">
                            <li class="mb-2" th:each="c : ${categories}">
                                <a th:href="@{/product/list(categoryId=${c.id})}" 
                                   class="text-decoration-none text-muted d-flex justify-content-between align-items-center"
                                   th:classappend="${currentCategoryId != null and #strings.equals(currentCategoryId, c.id)} ? 'text-danger fw-bold' : ''">
                                    <span th:text="${c.name}">Category Name</span>
                                    <!-- Dynamic count from categoryCounts map -->
                                    <span class="badge bg-light text-dark rounded-pill border" 
                                          th:text="${categoryCounts.get(c.id) ?: 0}">0</span>
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- Price Filter -->
                    <div class="mb-4">
                        <h5 class="fw-bold text-uppercase mb-3" style="font-size: 1rem;" th:text="#{product.list.price_range}">Mức giá</h5>
                        <form id="priceFilterForm" th:action="@{/product/filter}" method="get">
                            <!-- Hidden fields to preserve other filters -->
                            <input type="hidden" name="categoryId" th:value="${currentCategoryId}">
                            <input type="hidden" name="keyword" th:value="${currentKeyword}">
                            
                            <!-- Custom Price Range -->
                            <div class="mb-3">
                                <label class="form-label small text-muted">Từ (VNĐ):</label>
                                <input type="number" name="minPrice" class="form-control form-control-sm" 
                                       th:value="${currentMinPrice}" placeholder="0" min="0">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">Đến (VNĐ):</label>
                                <input type="number" name="maxPrice" class="form-control form-control-sm" 
                                       th:value="${currentMaxPrice}" placeholder="50000000" min="0">
                            </div>
                            <button type="submit" class="btn btn-danger btn-sm w-100" th:text="#{product.list.filter_price}">Lọc giá</button>
                        </form>
                        
                        <!-- Quick Price Filters -->
                        <div class="mt-3">
                            <div class="form-check mb-2">
                                <a th:href="@{/product/filter(categoryId=${currentCategoryId}, maxPrice=1000000, keyword=${currentKeyword})}" 
                                   class="text-decoration-none text-muted small">
                                    <i class="fas fa-filter me-1"></i>Dưới 1 triệu
                                </a>
                            </div>
                            <div class="form-check mb-2">
                                <a th:href="@{/product/filter(categoryId=${currentCategoryId}, minPrice=1000000, maxPrice=5000000, keyword=${currentKeyword})}" 
                                   class="text-decoration-none text-muted small">
                                    <i class="fas fa-filter me-1"></i>1 triệu - 5 triệu
                                </a>
                            </div>
                            <div class="form-check mb-2">
                                <a th:href="@{/product/filter(categoryId=${currentCategoryId}, minPrice=5000000, maxPrice=10000000, keyword=${currentKeyword})}" 
                                   class="text-decoration-none text-muted small">
                                    <i class="fas fa-filter me-1"></i>5 triệu - 10 triệu
                                </a>
                            </div>
                            <div class="form-check">
                                <a th:href="@{/product/filter(categoryId=${currentCategoryId}, minPrice=10000000, keyword=${currentKeyword})}" 
                                   class="text-decoration-none text-muted small">
                                    <i class="fas fa-filter me-1"></i>Trên 10 triệu
                                </a>
                            </div>
                        </div>
                        
                        <!-- Clear Filters -->
                        <div class="mt-3" th:if="${currentMinPrice != null or currentMaxPrice != null}">
                            <a th:href="@{/product/list(categoryId=${currentCategoryId})}" 
                               class="btn btn-outline-secondary btn-sm w-100">
                                <i class="fas fa-times me-1"></i><span th:text="#{product.list.clear_filter}">Xóa bộ lọc giá</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PRODUCT GRID -->
            <div class="col-lg-9">
                <!-- Search Bar -->
                <div class="mb-4">
                    <form th:action="@{/product/filter}" method="get" class="d-flex gap-2">
                        <!-- Hidden fields to preserve filters -->
                        <input type="hidden" name="categoryId" th:value="${currentCategoryId}">
                        <input type="hidden" name="minPrice" th:value="${currentMinPrice}">
                        <input type="hidden" name="maxPrice" th:value="${currentMaxPrice}">
                        
                        <input type="text" 
                               name="keyword"
                               class="form-control" 
                               th:value="${currentKeyword}"
                               th:placeholder="#{product.list.search_placeholder}">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                    
                    <!-- Clear search -->
                    <div class="mt-2" th:if="${currentKeyword != null and !#strings.isEmpty(currentKeyword)}">
                        <small class="text-muted">
                            <span th:text="#{product.list.search_results}">Kết quả tìm kiếm cho:</span> "<span class="fw-bold" th:text="${currentKeyword}"></span>"
                            <a th:href="@{/product/filter(categoryId=${currentCategoryId}, minPrice=${currentMinPrice}, maxPrice=${currentMaxPrice})}" 
                               class="text-danger text-decoration-none ms-2">
                                <i class="fas fa-times"></i> <span th:text="#{product.list.clear}">Xóa</span>
                            </a>
                        </small>
                    </div>
                </div>

                <!-- Sorting & View Options -->
                <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                    <span class="text-muted small"><span th:text="#{product.list.showing}">Hiển thị</span> <b class="text-dark" th:text="${#lists.size(items)}">9</b> <span th:text="#{product.list.products}">sản phẩm</span></span>
                    <select id="sortSelect" class="form-select form-select-sm w-auto border-0 bg-light fw-bold" aria-label="Sort">
                        <option value="0" selected th:text="#{product.list.sort_newest}">Mới nhất</option>
                        <option value="1" th:text="#{product.list.sort_price_asc}">Giá thấp đến cao</option>
                        <option value="2" th:text="#{product.list.sort_price_desc}">Giá cao đến thấp</option>
                        <option value="3" th:text="#{product.list.sort_bestseller}">Bán chạy nhất</option>
                    </select>
                </div>

                <div class="row row-cols-1 row-cols-md-3 g-3">
                    <!-- Product Item 1 -->
                    <div class="col" th:each="item : ${items}">
                        <div class="card h-100 product-card border-0 shadow-sm">
                            <div class="position-relative overflow-hidden">
                                <!-- Badge -->
                                <span class="badge bg-danger position-absolute top-0 start-0 m-2 z-2">-10%</span>
                                
                                <!-- Clickable Image to Detail Page -->
                                <a th:href="@{/product/detail/{id}(id=${item.id})}">
                                    <img th:src="@{${item.image}}" class="card-img-top p-3 product-img" alt="Product"
                                         onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">
                                </a>
                                
                                <!-- Hover Actions -->
                                <div class="product-overlay d-flex justify-content-center align-items-center gap-2">
                                     <!-- Disable if out of stock -->
                                     <a href="#" 
                                        th:class="${item.quantity > 0} ? 'btn btn-light rounded-circle shadow-sm p-2 btn-add-to-cart' : 'btn btn-light rounded-circle shadow-sm p-2 btn-disabled'"
                                        th:data-id="${item.id}" 
                                        th:attr="onclick=${item.quantity > 0 ? null : 'return false;'}" 
                                        th:title="#{product.add_to_cart}">
                                        <i th:class="${item.quantity > 0} ? 'fas fa-shopping-cart' : 'fas fa-ban'"></i>
                                    </a>
                                    <!-- Quick View Button -->
                                    <a href="#" 
                                       class="btn btn-light rounded-circle shadow-sm p-2 btn-quick-view" 
                                       th:data-id="${item.id}"
                                       th:title="#{product.quick_view}">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                </div>
                            </div>
                            
                            <div class="card-body text-center p-3">
                                <div class="text-muted small mb-1 text-uppercase" th:text="${item.category != null ? item.category.name : 'Unknown'}">CATEGORY</div>
                                <!-- Product Name - Clickable to detail page -->
                                <h6 class="card-title fw-bold mb-2">
                                    <a th:href="@{/product/detail/{id}(id=${item.id})}" 
                                       class="text-decoration-none text-dark" 
                                       th:text="${item.name}">
                                        Product Name
                                    </a>
                                </h6>
                                
                                <!-- STOCK BADGE -->
                                <div th:with="stockStatus=${@productServiceImpl.getStockStatus(item.quantity)}" class="mb-2">
                                    <span class="stock-badge"
                                          th:classappend="${stockStatus.name() == 'IN_STOCK'} ? 'in-stock' : (${stockStatus.name() == 'LOW_STOCK'} ? 'low-stock' : 'out-of-stock')"
                                          th:text="${@productServiceImpl.getStockMessage(item.quantity)}">
                                        Còn hàng
                                    </span>
                                </div>
                                
                                <!-- Price - NO WRAP -->
                                <div class="d-flex justify-content-center gap-2 align-items-baseline text-nowrap">
                                    <span class="text-muted text-decoration-line-through small" th:text="${#numbers.formatDecimal(item.price * 1.1, 0, 'COMMA', 0, 'POINT')} + ' ' + (${#locale.language == 'vi'} ? '₫' : 'VND')">0 ₫</span>
                                    <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' ' + (${#locale.language == 'vi'} ? '₫' : 'VND')">0 ₫</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pagination - Dynamic with Bootstrap -->
                <nav aria-label="Product pagination" th:if="${totalPages > 1}" class="mt-5">
                    <ul class="pagination justify-content-center">
                        <!-- Previous Button -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link border-0 text-muted" 
                               th:href="@{/product/filter(categoryId=${currentCategoryId}, minPrice=${currentMinPrice}, maxPrice=${currentMaxPrice}, keyword=${currentKeyword}, page=${currentPage - 1})}">
                                <i class="fas fa-chevron-left"></i>
                            </a>
                        </li>
                        
                        <!-- Page Numbers -->
                        <li class="page-item" 
                            th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link border-0 rounded-circle mx-1" 
                               th:classappend="${i == currentPage} ? 'bg-danger text-white shadow-sm' : 'text-dark'"
                               th:href="@{/product/filter(categoryId=${currentCategoryId}, minPrice=${currentMinPrice}, maxPrice=${currentMaxPrice}, keyword=${currentKeyword}, page=${i})}"
                               th:text="${i + 1}">1</a>
                        </li>
                        
                        <!-- Next Button -->
                        <li class="page-item" 
                            th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                            <a class="page-link border-0 text-muted" 
                               th:href="@{/product/filter(categoryId=${currentCategoryId}, minPrice=${currentMinPrice}, maxPrice=${currentMaxPrice}, keyword=${currentKeyword}, page=${currentPage + 1})}">
                                <i class="fas fa-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>
    </div>

<!-- Product List Filter & Search Script -->
<script th:src="@{/js/product-list.js}"></script>

</body>
</html>
