<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.reset.title} + ' | Jenka Coffee'">Đặt lại mật khẩu | Jenka Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-page-container">

<div class="auth-card">
    <div class="auth-card-header">
        <h2 th:text="#{auth.reset.title}">Đặt lại mật khẩu</h2>
        <p th:text="#{auth.reset.subtitle}">Nhập mật khẩu mới của bạn</p>
    </div>
    
    <div class="auth-card-body">
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="auth-alert auth-alert-success">
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="auth-alert auth-alert-danger">
            <span th:text="${error}"></span>
        </div>
        
        <form th:action="@{/auth/reset-password}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}">
            
            <div class="auth-form-group">
                <label class="auth-form-label" th:text="#{auth.reset.new_password_label}">Mật khẩu mới</label>
                <div class="auth-input-group">
                    <input type="password" 
                           class="auth-form-input" 
                           name="newPassword"
                           id="newPassword"
                           th:placeholder="#{auth.reset.new_password_placeholder}"
                           minlength="6"
                           required>
                    <button type="button" onclick="togglePassword('newPassword')">
                        👁️
                    </button>
                </div>
                <div class="password-strength-bar" id="strengthBar"></div>
                <div class="password-strength-text" id="strengthText" th:text="#{auth.reset.password_min}">Tối thiểu 6 ký tự</div>
            </div>
            
            <div class="auth-form-group">
                <label class="auth-form-label" th:text="#{auth.reset.confirm_password_label}">Xác nhận mật khẩu</label>
                <div class="auth-input-group">
                    <input type="password" 
                           class="auth-form-input" 
                           name="confirmPassword"
                           id="confirmPassword"
                           th:placeholder="#{auth.reset.confirm_password_placeholder}"
                           minlength="6"
                           required>
                    <button type="button" onclick="togglePassword('confirmPassword')">
                        👁️
                    </button>
                </div>
                <div class="auth-help-text auth-alert-danger" id="matchError" style="display: none;">
                    ⚠ <span th:text="#{auth.reset.password_mismatch}">Mật khẩu không khớp!</span>
                </div>
            </div>
            
            <button type="submit" class="auth-btn-primary" th:text="#{auth.reset.submit}">
                Đặt lại mật khẩu
            </button>
        </form>
        
        <div class="auth-card-footer">
            <a th:href="@{/auth/login}">← <span th:text="#{auth.forgot.back_login}">Quay lại đăng nhập</span></a>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const messages = {
        weak: /*[[#{auth.reset.password_weak}]]*/ 'Yếu',
        medium: /*[[#{auth.reset.password_medium}]]*/ 'Trung bình',
        strong: /*[[#{auth.reset.password_strong}]]*/ 'Mạnh'
    };
    /*]]>*/
    
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    // Password strength indicator
    document.getElementById('newPassword').addEventListener('input', function() {
        const password = this.value;
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        
        if (strength <= 1) {
            strengthBar.className = 'password-strength-bar weak';
            strengthText.textContent = messages.weak;
            strengthText.className = 'password-strength-text weak';
        } else if (strength <= 3) {
            strengthBar.className = 'password-strength-bar medium';
            strengthText.textContent = messages.medium;
            strengthText.className = 'password-strength-text medium';
        } else {
            strengthBar.className = 'password-strength-bar strong';
            strengthText.textContent = messages.strong;
            strengthText.className = 'password-strength-text strong';
        }
    });
    
    // Password match validation
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const newPassword = document.getElementById('newPassword').value;
        const matchError = document.getElementById('matchError');
        
        if (this.value && this.value !== newPassword) {
            matchError.style.display = 'block';
        } else {
            matchError.style.display = 'none';
        }
    });
    
    // Form validation
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (newPassword !== confirmPassword) {
            e.preventDefault();
            document.getElementById('matchError').style.display = 'block';
        }
    });
</script>
</body>
</html>
