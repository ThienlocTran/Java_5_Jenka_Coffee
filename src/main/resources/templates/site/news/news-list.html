<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: html_content(~{::body})}">
<body>

    <!-- BREADCRUMB -->
    <div class="bg-light py-3 mb-4">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="/home" class="text-decoration-none text-muted" th:text="#{breadcrumb.home}">Trang chủ</a></li>
                    <li class="breadcrumb-item active text-dark fw-bold" aria-current="page" th:text="#{breadcrumb.news}">Tin tức</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="container mb-5">
        <h2 class="fw-bold mb-4" th:text="#{news.list.heading}">Tin tức & Sự kiện</h2>

        <!-- News Grid -->
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="item : ${items}">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="position-relative overflow-hidden">
                        <img th:src="@{${item.image}}" 
                             class="card-img-top" 
                             alt="News Image"
                             style="height: 250px; object-fit: cover;"
                             onerror="this.src='https://via.placeholder.com/400x250?text=No+Image'">
                    </div>
                    
                    <div class="card-body">
                        <div class="text-muted small mb-2">
                            <i class="far fa-calendar-alt me-1"></i>
                            <span th:text="${#temporals.format(item.createDate, 'dd/MM/yyyy')}">01/01/2026</span>
                        </div>
                        <h5 class="card-title fw-bold mb-3">
                            <a th:href="@{/news/detail/{id}(id=${item.id})}" 
                               class="text-decoration-none text-dark stretched-link" 
                               th:text="${item.title}">
                                News Title
                            </a>
                        </h5>
                        <p class="card-text text-muted" 
                           th:text="${#strings.length(item.content) > 100 ? #strings.substring(item.content, 0, 100) + '...' : item.content}">
                            News content preview...
                        </p>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div class="col-12" th:if="${#lists.isEmpty(items)}">
                <div class="text-center py-5">
                    <i class="fas fa-newspaper fa-4x text-muted mb-3"></i>
                    <p class="text-muted" th:text="#{news.list.empty}">Chưa có tin tức nào</p>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/news/list(page=${currentPage - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" 
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/news/list(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/news/list(page=${currentPage + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

</body>
</html>
