<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html_content(~{::body})}">
<head>
    <title>Liên Hệ - Jenka Coffee</title>
</head>
<body>
<div class="container py-5">
    <h2 class="text-center fw-bold mb-5">LIÊN HỆ VỚI CHÚNG TÔI</h2>

    <div th:if="${param.success}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>Cảm ơn bạn! Chúng tôi đã nhận được tin nhắn.
    </div>
    <div th:if="${param.error}" class="alert alert-danger">
        <i class="fas fa-exclamation-triangle me-2"></i>Lỗi gửi mail. Vui lòng thử lại sau!
    </div>

    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="p-4 bg-light rounded-3 h-100">
                <h5 class="fw-bold"><i class="fas fa-map-marker-alt text-danger me-2"></i>Địa chỉ</h5>
                <p class="text-muted">12 Trần Thị Do, Phường Tân Thới Hiệp - Khu phố 24, Quận 12, TP.HCM</p>

                <h5 class="fw-bold mt-4"><i class="fas fa-phone text-danger me-2"></i>Hotline</h5>
                <p class="text-muted">0817 909 090</p>

                <h5 class="fw-bold mt-4"><i class="fas fa-envelope text-danger me-2"></i>Email</h5>
                <p class="text-muted">coffeejenka274@gmail.com</p>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card border-0 shadow-sm p-4">
                <form th:action="@{/contact/send}" th:object="${contact}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nhập tên của bạn" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Email liên hệ" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tiêu đề</label>
                        <input type="text" th:field="*{subject}" class="form-control" placeholder="Bạn cần hỗ trợ gì?">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nội dung</label>
                        <textarea th:field="*{message}" class="form-control" rows="5" placeholder="Nhập nội dung tin nhắn..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-danger px-4 py-2 fw-bold">
                        <i class="fas fa-paper-plane me-2"></i>GỬI TIN NHẮN
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
