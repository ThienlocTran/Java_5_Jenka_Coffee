# Test Configuration for JWT Security Tests
# This file is required for AuthSecurityFilterTest to work properly

# JWT Configuration
app.jwt.secret=test-secret-must-be-at-least-32-characters-long-for-hs256-algorithm-ok
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Database Configuration (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Cloudinary for tests
cloudinary.enabled=false
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

# Disable Email for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Google OAuth (dummy values for tests)
google.oauth.client-id=test-client-id

# Logging
logging.level.com.springboot.jenka_coffee=INFO
logging.level.org.springframework.security=DEBUG

# Disable scheduling in tests
spring.task.scheduling.enabled=false
