version: '3.8'

# Local/dev only.
# Do not use this file to initialize or upgrade PostgreSQL on the live VPS.
# Do not copy this init.sql mount into production.
# /docker-entrypoint-initdb.d/init.sql is for fresh local/dev DB initialization only.
# Production schema changes must be run manually via docs/deploy/production_migration_safe.sql.
# If VPS production uses Docker PostgreSQL, use docker-compose.production.yml.
# On production: never run docker compose down -v.
# On production: never delete ./pg-data.

services:
  postgres:
    container_name: jenka-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=jenka_coffee
      - POSTGRES_USER=jenka_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jenka_local_password}
    volumes:
      - ./pg-data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jenka_user -d jenka_coffee"]
      interval: 10s
      timeout: 5s
      retries: 5

# For Spring Boot local:
# SPRING_PROFILES_ACTIVE=local
# LOCAL_DATABASE_URL=jdbc:postgresql://<host>:5432/<database>?sslmode=require
# LOCAL_DATABASE_USERNAME=<database-user>
# LOCAL_DATABASE_PASSWORD=<database-password>
