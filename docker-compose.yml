version: '3.8'

# Local PostgreSQL helper only.
# Defaults below are aligned with application-local.properties fallback values.
# Production backend on VPS must use:
#   SPRING_PROFILES_ACTIVE=production
#   SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jenka_coffee
#   SPRING_DATASOURCE_USERNAME=jenka_user
#   SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

services:
  postgres:
    container_name: jenka-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=jenka_coffee
      - POSTGRES_USER=jenka_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jenka_local_password}
    volumes:
      - ./pg-data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jenka_user -d jenka_coffee"]
      interval: 10s
      timeout: 5s
      retries: 5

# For Spring Boot local:
# SPRING_PROFILES_ACTIVE=local
# LOCAL_DATABASE_URL=jdbc:postgresql://<host>:5432/<database>?sslmode=require
# LOCAL_DATABASE_USERNAME=<database-user>
# LOCAL_DATABASE_PASSWORD=<database-password>
