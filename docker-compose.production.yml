version: '3.8'

# Production Docker Compose for VPS deployment.
# Safety rules:
# - DO NOT mount init.sql into /docker-entrypoint-initdb.d/ on production.
# - DO NOT run docker compose down -v on production.
# - DO NOT delete ./pg-data on production.
# - Production schema changes must be applied manually with docs/deploy/production_migration_safe.sql
#   before starting the new backend container.
# - init.sql and init_production.sql must never be run on the live VPS.

services:
  postgres:
    container_name: jenka-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: jenka-backend
    image: ${APP_IMAGE:-jenka-coffee-backend:latest}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DDL_AUTO=${DDL_AUTO}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - APP_SITE_URL=${APP_SITE_URL}
      - APP_BASE_URL=${APP_BASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-WARN}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
    restart: unless-stopped
